<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>対局タイマー - AI審判付きナンバーアタック</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --active-color: #4CAF50;
            --pause-color: #f39c12;
            --win-color: #2ecc71;
            --lose-color: #ff7675;
            --number-color: #3498db;
            --attack-color: #e74c3c;
            --arrow-color: rgba(255, 255, 255, 0.4);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background-color: var(--bg-color); overflow: hidden; user-select: none; }

        /* 入力UI */
        #word-ui { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); z-index: 100; text-align: center; background: rgba(0,0,0,0.9); padding: 30px; border-radius: 20px; display: none; width: 80%; }

        #number-display { position: absolute; top: 2%; left: 50%; transform: translateX(-50%); font-size: 18vw; font-weight: 900; color: var(--number-color); z-index: 10; pointer-events: none; }
        .container { display: flex; height: 100vh; width: 100vw; }
        .timer-side { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: background-color 0.3s; position: relative; }
        #side-left { background-color: #2c3e50; }
        #side-right { background-color: #34495e; }
        .active { background-color: var(--active-color) !important; }
        .time-val { font-size: 14vw; color: white; }
        .status-label { font-size: 2.5vw; color: white; opacity: 0.5; }
    </style>
</head>
<body id="body-root">

    <div id="word-ui">
        <input type="text" id="word-input" style="font-size: 3rem; width: 90%; text-align: center;" placeholder="言葉を入力">
        <br>
        <button id="judge-btn" onclick="submitWord()" style="margin-top: 20px; padding: 15px 40px; font-size: 2rem;">判定する</button>
        <div id="judge-result" style="color: white; margin-top: 10px;"></div>
    </div>

    <div id="number-display">--</div>
    
    <div class="container">
        <div id="side-left" class="timer-side" onclick="prepareTurn(2)">
            <div class="status-label">PLAYER 1</div>
            <div id="m1" class="time-val">05:00</div>
        </div>
        <div id="side-right" class="timer-side" onclick="prepareTurn(1)">
            <div class="status-label">PLAYER 2</div>
            <div id="m2" class="time-val">05:00</div>
        </div>
    </div>

    <script>
        let timeLeft1 = 300, timeLeft2 = 300, activePlayer = null, gameStarted = false, currentNum = 0, lastWord = "しりとり";
        let nextTargetPlayer = null;

        function prepareTurn(targetPlayer) {
            if (!gameStarted) { gameStarted = true; getNextNum(); }
            nextTargetPlayer = targetPlayer;
            document.getElementById('word-ui').style.display = 'block';
            document.getElementById('word-input').focus();
        }

        async function submitWord() {
            const word = document.getElementById('word-input').value;
            const res = await fetch('/api/judge', {
                method: 'POST',
                body: JSON.stringify({ word, prevWord: lastWord, requiredLength: currentNum })
            });
            const result = await res.json();

            if (result.is_valid) {
                lastWord = word;
                document.getElementById('word-ui').style.display = 'none';
                executeTurn(nextTargetPlayer);
            } else {
                document.getElementById('judge-result').textContent = result.reason || "不正解です";
            }
        }

        function executeTurn(player) {
            activePlayer = player;
            getNextNum();
            render();
        }

        function getNextNum() {
            currentNum = Math.floor(Math.random() * 10) + 2;
            document.getElementById('number-display').textContent = currentNum;
        }

        function render() {
            document.getElementById('side-left').classList.toggle('active', activePlayer === 1);
            document.getElementById('side-right').classList.toggle('active', activePlayer === 2);
        }
    </script>
</body>
</html>
